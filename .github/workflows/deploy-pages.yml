name: Deploy Nilgiri site to Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/website/**'
      - 'docs/leaderboard/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate leaderboard data
        run: |
          pip install -r docs/scripts/requirements.txt
          python docs/scripts/validate_results.py docs/leaderboard/results.json docs/leaderboard/schema.json

      - name: Install, build, and upload the site
        uses: withastro/action@v6
        with:
          path: docs/website
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
