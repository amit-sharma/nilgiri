---
# Sync each rotated host's local Administrator password to the inventory
# value. After a snapshot revert, hosts are back at their GOAD/group-B baseline
# while inventory carries the post-rotation values. Tries the inventory
# password first, then falls back through known baselines and rotates.
# Run this BEFORE any other play after a snapshot revert.
#
# Hosts covered:
#   dc1.oscar          baseline=NgtI75cKV+Pu          → inventory
#   wiki.charlie       baseline=Nilgiri-WS2022!      → inventory
#   web.oscar          baseline=Nilgiri-WS2022!      → inventory
#   db.oscar           baseline=Nilgiri-WS2022!      → inventory
#   dc1.alpha          baseline=Nilgiri-WS2022!      → inventory
#   secrets.alpha      baseline=Nilgiri-WS2022!      → inventory

- name: Sync inventory passwords on hosts that may be at baseline
  hosts:
    - dc1.oscar
    - wiki.charlie
    - web.oscar
    - db.oscar
    - dc1.alpha
    - secrets.alpha
  gather_facts: false
  vars:
    # Known baselines to try if the inventory password fails. Order matters
    # only for performance; first match wins.
    known_baselines:
      - "NgtI75cKV+Pu"          # GOAD ad-servers default (dc1.oscar)
      - "Nilgiri-WS2022!"      # Group-B baseline (5 hosts)
  tasks:
    - name: Probe with inventory password
      ansible.windows.win_ping:
      register: probe_inv
      ignore_unreachable: true
      ignore_errors: true

    - name: For unreachable hosts, try each known baseline in turn
      ansible.windows.win_ping:
      register: probe_baseline
      vars:
        ansible_password: "{{ item }}"
      loop: "{{ known_baselines }}"
      when: probe_inv is unreachable or (probe_inv.failed | default(false))
      ignore_unreachable: true
      ignore_errors: true

    - name: Identify the working password for each unreachable host
      ansible.builtin.set_fact:
        working_password: >-
          {{
            (probe_baseline.results | selectattr('failed','equalto',false)
                                    | selectattr('unreachable','equalto',false)
                                    | list
                                    | first
                                    | default({}))
            .item | default('')
          }}
      when: probe_inv is unreachable or (probe_inv.failed | default(false))

    - name: Rotate to the inventory password
      ansible.windows.win_user:
        name: Administrator
        password: "{{ ansible_password }}"
        update_password: always
      vars:
        ansible_password: "{{ working_password }}"
      when:
        - probe_inv is unreachable or (probe_inv.failed | default(false))
        - working_password | length > 0
      register: rotation_result

    - name: Report unhealable hosts (no baseline matched)
      ansible.builtin.fail:
        msg: |
          {{ inventory_hostname }} is at none of the known baselines and
          not at the inventory password either. Manual intervention required.
          Tried: inventory + {{ known_baselines | join(', ') }}.
      when:
        - probe_inv is unreachable or (probe_inv.failed | default(false))
        - working_password | length == 0
