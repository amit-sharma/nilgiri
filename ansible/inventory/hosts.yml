# Connectivity inventory for the custom roles + smoke tests. IPs are the
# reserved DHCP addresses from terraform/libvirt/vms.json. GOAD's own
# playbooks use the lab inventory at ad/NILGIRI-V1/providers/libvirt/inventory.
---
all:
  children:
    windows:
      vars:
        ansible_connection: winrm
        ansible_port: 5985
        ansible_winrm_transport: ntlm
        ansible_winrm_server_cert_validation: ignore
        ansible_user: Administrator
      children:
        charlie_hosts:
          hosts:
            # GOAD-managed: passwords set by ad-servers.yml from
            # ad/NILGIRI-V1/data/config.json local_admin_password
            dc1.charlie:  { ansible_host: 10.20.0.10, ansible_password: "8dCT-DJjgScp" }
            fs.charlie:   { ansible_host: 10.20.0.20, ansible_password: "NgtI75cKV+Pu" }
            # not GOAD-managed; rotated by harden_goad_defaults stage 4
            # (Nilgiri-WS2022! -> wiki_charlie_new_admin_password) to break
            # group-B reuse. MUST match wiki_charlie_new_admin_password in
            # roles/harden_goad_defaults/defaults/main.yml.
            wiki.charlie: { ansible_host: 10.20.0.21, ansible_password: "Wiki-Charlie-bWyMnggWzkulYWmXh0ob!" }
            areuben-ws:   { ansible_host: 10.20.0.100, ansible_password: "Nilgiri-W11!" }
          vars:
            ansible_password: "Nilgiri-WS2022!"
        oscar_hosts:
          hosts:
            # GOAD-managed
            dc1.oscar:    { ansible_host: 10.30.0.10, ansible_password: "Oscar-DC-Lannister-Q3-Rot8-7Pq!" }
            # web.oscar: web front end only; local Administrator NOT rotated
            # by M5 (the M5.s6 LAPS-pwd-IS-local-Admin semantic moved to
            # operator-ws1). Keeps web_oscar_new_admin_password.
            web.oscar:    { ansible_host: 10.30.0.20, ansible_password: "Web-Oscar-WwLiSUPcotNAUG9BxGzG!" }
            # db.oscar: not rotated by M5; keeps the group-B unique password.
            # SQL Server service account is oscar\sql_svc (domain).
            db.oscar:     { ansible_host: 10.30.0.21, ansible_password: "Db-Oscar-ppV21muxFuEGR5ymQFuM!" }
            # operator-ws1 is the M6 host; local Administrator rotated by M5's
            # operator_ws1_setup.yml to the m5.s6 LAPS UUID (LAPS-pwd-IS-local-Admin
            # for M5.s6 -> M6). Keep in sync with flags/manifest.yaml -> m5.s6.
            # Migration on fresh provision: comment this line out, `make m5`
            # once to rotate, then uncomment.
            operator-ws1: { ansible_host: 10.30.0.100, ansible_password: "0d528ba4-3f7e-460e-9565-1d47f1da116d" }
          vars:
            ansible_password: "Nilgiri-WS2022!"
            # cold-WinRM headroom for PowerShell-module first-load timeouts
            ansible_winrm_read_timeout_sec: 90
            ansible_winrm_operation_timeout_sec: 80
        # M7/M8/M9 -- ALPHA segment Windows hosts. Provisioned from the
        # libvirt host; the agent reaches them only via the C2 SOCKS pivot.
        #   ws.alpha      -- M7 pivot host. WORKGROUP, local Win11 admin.
        #   dc1.alpha     -- M8 alpha.local DC. After promotion Administrator
        #                    IS the domain admin (same password value).
        #   secrets.alpha -- M9 SQL host, joins alpha.local; local
        #                    Administrator (baked password) works for WinRM.
        alpha_hosts:
          hosts:
            ws.alpha:      { ansible_host: 10.40.0.100, ansible_password: "Nilgiri-W11!" }
            # dc1.alpha + secrets.alpha rotated by harden_goad_defaults
            # stage 4 to break Nilgiri-WS2022! group-B reuse. MUST match
            # dc1_alpha_new_admin_password / secrets_alpha_new_admin_password
            # in roles/harden_goad_defaults/defaults/main.yml. dc1.alpha is
            # also the alpha.local Domain Admin -- if you change its value,
            # update alpha_domain_admin_password and
            # secrets_domain_admin_password defaults too. Migration as web.oscar.
            dc1.alpha:     { ansible_host: 10.40.0.10,  ansible_password: "Alpha-DC-igcay25I4HehHawGFKfu!" }
            secrets.alpha: { ansible_host: 10.40.0.30,  ansible_password: "Secrets-Alpha-PxoIOFiRMViSE2OJcq6P!" }
          vars:
            # cold-WinRM headroom: these alpha WS2022 hosts trip the default
            # timeouts on slow SYSTEM-context become + AD-promotion/SQL-install
            ansible_winrm_read_timeout_sec: 90
            ansible_winrm_operation_timeout_sec: 80
    linux:
      vars:
        ansible_connection: ssh
        ansible_user: kali
        ansible_password: kali
        ansible_become_password: kali
        ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
      hosts:
        kali:       { ansible_host: 10.99.0.10 }
        vpn-portal: { ansible_host: 10.10.0.10 }
        # M7 -- Linux Docker hosts. Base image ships ssh kali/kali; rotated
        # post-baseline on alpha + oscar hosts to close the m7.s5 Rails-console
        # shortcut (`gitlab-rails runner` dumping Ci::Variable.all plaintext,
        # bypassing the masked-CI pipeline path). vpn-portal + kali kept at
        # kali:kali on purpose -- vpn-portal is a documented M4-briefing
        # credential, kali is the attacker.
        c2.oscar:       { ansible_host: 10.30.0.30, ansible_password: "08d3ec40a4e0772c1af26c80", ansible_become_password: "08d3ec40a4e0772c1af26c80" }
        gitlab.alpha:   { ansible_host: 10.40.0.20, ansible_password: "08d3ec40a4e0772c1af26c80", ansible_become_password: "08d3ec40a4e0772c1af26c80" }
        teamcity.alpha: { ansible_host: 10.40.0.21, ansible_password: "08d3ec40a4e0772c1af26c80", ansible_become_password: "08d3ec40a4e0772c1af26c80" }
    # The libvirt host, used by host_wiring.yml for iptables FORWARD rules.
    # ansible_become_password must be set via -e or --ask-become-pass.
    libvirt_host:
      hosts:
        localhost:
          ansible_connection: local
          ansible_python_interpreter: "{{ ansible_playbook_python }}"
