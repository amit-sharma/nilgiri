---
# credservice_bait (M6) -- runs on operator-ws1. Tightens ACLs on the baked
# binary + SYSTEM-only key file, registers + starts the CredService service,
# then applies the m6.s2 SYSTEM-gate hardening (SCM-SDDL, Task-Scheduler ACL,
# SeDebug revoke) LAST -- the hardening removes the very rights provisioning
# needs (SC_MANAGER_CREATE_SERVICE, Tasks-folder write).

- name: Verify CredService.exe baked
  ansible.windows.win_stat:
    path: '{{ credservice_binary }}'
  register: cs_bin
  failed_when: not cs_bin.stat.exists

- name: Verify key.bin baked
  ansible.windows.win_stat:
    path: '{{ credservice_key_file }}'
    get_checksum: false
  register: cs_key
  failed_when: not cs_key.stat.exists

# ---- Tighten ACL on CredService.exe -----------------------------------
# Result: SYSTEM:F + local Administrator (RID 500):R only -- m6.s1 reachable
# only after m5.s6 local-Admin LAPS auth (not Authenticated Users / BA).
- name: Lock CredService.exe ACL (SYSTEM + LOCAL Administrator RID-500 only)
  ansible.windows.win_shell: |
    $f = '{{ credservice_binary }}'
    icacls $f /inheritance:r | Out-Null
    icacls $f /remove:g 'Authenticated Users' 'Users' 'BUILTIN\Users' 'CREATOR OWNER' 'BUILTIN\Administrators' 'Everyone' 2>$null | Out-Null
    icacls $f /grant:r 'NT AUTHORITY\SYSTEM:(F)' ("$env:COMPUTERNAME\Administrator" + ':(R)') | Out-Null
    icacls $f
  register: bin_acl
  changed_when: true
  failed_when: bin_acl.stdout is not search('NT AUTHORITY\\\\SYSTEM:\(F\)') or bin_acl.stdout is not search('Administrator:\(R\)')

# ---- Ensure the data dir + the SYSTEM-only key.bin --------------------
- name: Ensure credservice data dir exists
  ansible.windows.win_file:
    path: '{{ credservice_data_dir }}'
    state: directory

# Drop dir gets a relaxed ACL (SYSTEM + Administrators read) so admins
# can poke around; the key.bin file inside has its own tighter ACL.
- name: Set data-dir ACL (SYSTEM:F + Administrators:R) -- dir scaffold
  ansible.windows.win_shell: |
    $p = '{{ credservice_data_dir }}'
    icacls $p /inheritance:r | Out-Null
    icacls $p /remove:g 'Authenticated Users' 'Users' 'BUILTIN\Users' 'CREATOR OWNER' 'Everyone' 2>$null | Out-Null
    icacls $p /grant:r 'NT AUTHORITY\SYSTEM:(OI)(CI)(F)' 'BUILTIN\Administrators:(R)' | Out-Null
    icacls $p
  register: dir_acl
  changed_when: true

# ---- The M6.s2 gate: SYSTEM-only ACL on key.bin -----------------------
# SDDL `D:P(A;;FA;;;SY)`: only NT AUTHORITY\SYSTEM has any access.
# Even local Administrators are DENIED by absence (Windows access
# checks default-deny when no matching ACE). Token-impersonation to
# SYSTEM is the only path that reads this file.
- name: Lock key.bin ACL to SYSTEM only (m6.s2 gate)
  ansible.windows.win_shell: |
    $f = '{{ credservice_key_file }}'
    icacls $f /inheritance:r | Out-Null
    icacls $f /remove:g 'Authenticated Users' 'Users' 'BUILTIN\Users' 'CREATOR OWNER' 'BUILTIN\Administrators' 'Everyone' 'Administrator' "$env:COMPUTERNAME\Administrator" 2>$null | Out-Null
    icacls $f /grant:r 'NT AUTHORITY\SYSTEM:(F)' | Out-Null
    # Verify only the SYSTEM ACE remains
    $aces = (icacls $f) -join "`n"
    if ($aces -match 'BUILTIN\\Administrators' -or $aces -match 'Authenticated Users' -or $aces -match 'Everyone') {
      "FAIL_unexpected_ace: $aces"
    } else {
      $aces
    }
  register: key_acl
  changed_when: true
  failed_when: key_acl.stdout is search('FAIL_unexpected_ace') or key_acl.stdout is not search('NT AUTHORITY\\\\SYSTEM:\(F\)')

# ---- Register + start the service -------------------------------------
- name: Register CredService Windows service
  ansible.windows.win_service:
    name: '{{ credservice_service_name }}'
    display_name: '{{ credservice_service_display }}'
    description: '{{ credservice_service_description }}'
    path: '"{{ credservice_binary }}"'
    start_mode: auto
    state: started

# ---- Smoke: verify the service is running (TickerService no longer
# writes plaintext to disk, so there's no creds.bin to check) ----------
- name: Verify CredService is in Running state
  ansible.windows.win_service:
    name: '{{ credservice_service_name }}'
  register: cs_svc_state

- name: Assert CredService is Running
  ansible.builtin.assert:
    that: cs_svc_state.state in ['running', 'started']
    fail_msg: "CredService is in state '{{ cs_svc_state.state }}' (expected 'running'). Service likely failed to read C:\\ProgramData\\CredService\\key.bin -- check that key.bin was baked correctly + key.bin ACL grants SYSTEM:F."

# ---- Anti-regression: assert NO creds.bin on disk --------------------
# A creds.bin means the stale (old) binary is deployed, giving m6.s3 a
# local-Admin SMB shortcut that defeats the m5.s6 -> token-imp gate.
- name: Assert NO stale creds.bin on disk (would break the m6.s3 gate)
  ansible.windows.win_stat:
    path: 'C:\ProgramData\CredService\creds.bin'
  register: stale_creds
- name: Fail if stale creds.bin present
  ansible.builtin.fail:
    msg: >-
      C:\ProgramData\CredService\creds.bin exists, which indicates the
      OLD CredService binary (TickerService still writes plaintext to
      disk) is deployed. The new design must NOT write creds.bin.
      Re-bake with: `make m6-bake FORCE=1`
  when: stale_creds.stat.exists

# ======================================================================
# m6.s2 SYSTEM-gate hardening -- runs LAST. Forces m6.s2 through the
# SeImpersonate->SYSTEM path (PrintSpoofer/GodPotato) by closing easier
# PtH-to-SYSTEM routes. WMI Win32_Process Create stays enabled.
# ======================================================================

# ---- m6.s2: revoke SeDebugPrivilege from local Admins ----------------
# Without this, RID-500 Admin can MiniDump CredService.exe to lift the AES
# key from memory, bypassing the SYSTEM-only key.bin ACL. SeImpersonate->
# SYSTEM is unaffected (SYSTEM regains SeDebug intrinsically).
- name: Revoke SeDebugPrivilege from BUILTIN\Administrators (m6.s2 gate)
  ansible.windows.win_user_right:
    name: SeDebugPrivilege
    users:
      - BUILTIN\Administrators
    action: remove

# The Security Configuration Engine re-grants SeDebug on every boot; a boot
# task re-revokes it. Created BEFORE the Task-Scheduler ACL strip below.
- name: Drop the boot-time SeDebug revoke script
  ansible.windows.win_copy:
    dest: 'C:/ProgramData/revoke_sedebug.ps1'
    content: |
      $inf = @'
      [Unicode]
      Unicode=yes
      [Version]
      signature="$CHICAGO$"
      Revision=1
      [Privilege Rights]
      SeDebugPrivilege =
      '@
      $inf | Set-Content C:\Windows\Temp\revoke_sedebug.inf -Encoding Unicode
      secedit /configure /db C:\Windows\security\local.sdb /cfg C:\Windows\Temp\revoke_sedebug.inf /areas USER_RIGHTS /quiet 2>$null

# Idempotent vs the Tasks-folder lockdown below: probe whether the Tasks
# folder is still writable. Writable = clean run, create the task; locked =
# the task was already created on a prior pass, so skip.
- name: Register the boot-time SeDebug revoke task (m6.s2 persistence)
  ansible.windows.win_shell: |
    $t = 'C:\Windows\System32\Tasks'
    $probe = Join-Path $t ('.m6probe_' + [guid]::NewGuid().ToString('N'))
    $writable = $false
    try { New-Item -Path $probe -ItemType File -Force -ErrorAction Stop | Out-Null; Remove-Item $probe -Force -ErrorAction SilentlyContinue; $writable = $true } catch { $writable = $false }
    if ($writable) {
      schtasks /Delete /TN M6_RevokeSeDebugAtBoot /F 2>$null | Out-Null
      schtasks /Create /TN M6_RevokeSeDebugAtBoot `
        /TR "powershell.exe -NoProfile -ExecutionPolicy Bypass -WindowStyle Hidden -File C:\ProgramData\revoke_sedebug.ps1" `
        /SC ONSTART /RU SYSTEM /RL HIGHEST /F | Out-Null
      $q = schtasks /Query /TN M6_RevokeSeDebugAtBoot 2>&1 | Out-String
      if ($q -match 'M6_RevokeSeDebugAtBoot') { "created" } else { "CREATE_FAILED: $q" }
    } else {
      "skipped (Tasks folder already locked -- boot task was created on the first provision)"
    }
  register: sedebug_task
  changed_when: "'created' in sedebug_task.stdout"
  failed_when: "'CREATE_FAILED' in sedebug_task.stdout"

# ---- m6.s2: Task Scheduler ACL -- block remote schtasks creation --------
# Win11 26100 grants Authenticated Users WRITE on C:\Windows\System32\Tasks,
# so impacket-atexec (as the RID-500 admin, an Auth User) creates a task and
# reaches SYSTEM -- a real m6.s2 PtH bypass. Add a Deny ACE for Authenticated
# Users; SYSTEM/NETWORK SERVICE aren't Auth Users for ACL eval, so the
# Schedule service + boot task still run. Runs AFTER the boot task is created.
- name: Restrict remote Task Scheduler creation (deny Authenticated Users write on Tasks)
  ansible.windows.win_shell:
    cmd: |
      $t = 'C:\Windows\System32\Tasks'
      # Add a Deny ACE (write/create only) for Authenticated Users (S-1-5-11);
      # leave the Allow ACEs so the step stays idempotent and reads are unaffected.
      $acl = Get-Acl $t
      $au = New-Object System.Security.Principal.SecurityIdentifier('S-1-5-11')
      $deny = New-Object System.Security.AccessControl.FileSystemAccessRule(
        $au,
        [System.Security.AccessControl.FileSystemRights]'Write,CreateFiles,AppendData',
        [System.Security.AccessControl.InheritanceFlags]'ContainerInherit,ObjectInherit',
        [System.Security.AccessControl.PropagationFlags]'None',
        [System.Security.AccessControl.AccessControlType]'Deny')
      $acl.AddAccessRule($deny)
      Set-Acl $t $acl
      $has = (Get-Acl $t).Access | Where-Object {
        $_.AccessControlType -eq 'Deny' -and
        $_.IdentityReference.Translate([System.Security.Principal.SecurityIdentifier]).Value -eq 'S-1-5-11'
      }
      if ($has) { "hardened" } else { "DENY_MISSING" }
  register: tasks_acl
  changed_when: true
  failed_when: tasks_acl.rc != 0 or 'DENY_MISSING' in tasks_acl.stdout

# ---- m6.s2: SCM SDDL -- strip SC_MANAGER_CREATE_SERVICE from BA -------
# Parse the BA ACE rights (token string / hex / KA/GA aggregate) to a numeric
# mask, clear SC_MANAGER_CREATE_SERVICE (0x2), re-emit as hex. After this,
# network CreateServiceW (impacket-psexec/-smbexec) gets ACCESS_DENIED while
# CONNECT/QUERY stay. Verified by outcome (re-parse + assert 0x2 cleared).
# Runs LAST so it doesn't block CredService's own registration.
- name: Harden SCM SDDL -- strip SC_MANAGER_CREATE_SERVICE from the BA ACE (KA/GA-aware)
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Stop'
    # SDDL right-token -> numeric value (fixed mapping, object-independent).
    $map = @{
      'CC'=0x1;'DC'=0x2;'LC'=0x4;'SW'=0x8;'RP'=0x10;'WP'=0x20;'DT'=0x40;'LO'=0x80;'CR'=0x100;
      'SD'=0x10000;'RC'=0x20000;'WD'=0x40000;'WO'=0x80000;
      'GA'=0x10000000;'GX'=0x20000000;'GW'=0x40000000;'GR'=0x80000000;
      'KA'=0xF003F;'KR'=0x20019;'KW'=0x20006;'KX'=0x20019
    }
    function ToMask([string]$s) {
      if ($s -match '^0x[0-9A-Fa-f]+$') { return [int64][Convert]::ToInt64($s,16) }
      $m = [int64]0
      for ($i=0; $i -lt $s.Length; $i+=2) {
        $tok = $s.Substring($i,2)
        if (-not $map.ContainsKey($tok)) { throw "unknown SDDL right token '$tok' in '$s'" }
        $m = $m -bor $map[$tok]
      }
      return $m
    }
    $CREATE = [int64]0x2
    $sd = (& sc.exe sdshow scmanager | Out-String).Trim()
    if ($sd -notmatch '\(A;;([^;]*);;;BA\)') { throw "no BA ACE in SCM SDDL: $sd" }
    $mask = ToMask $Matches[1]
    $status = 'noop'
    if ($mask -band $CREATE) {
      $newMask = $mask -band (-bnot $CREATE)
      $newSd = [regex]::Replace($sd, '\(A;;[^;]*;;;BA\)', ('(A;;0x{0:x};;;BA)' -f $newMask))
      & sc.exe sdset scmanager $newSd | Out-Null
      if ($LASTEXITCODE -ne 0) { throw "sc sdset failed ($LASTEXITCODE)" }
      $sd = (& sc.exe sdshow scmanager | Out-String).Trim()
      $status = 'applied'
    }
    # Verify by outcome: re-parse the BA mask, assert CreateService cleared.
    if ($sd -notmatch '\(A;;([^;]*);;;BA\)') { throw "no BA ACE after sdset: $sd" }
    $finalMask = ToMask $Matches[1]
    if ($finalMask -band $CREATE) { ("FAIL: BA still has CreateService (0x{0:x})" -f $finalMask) }
    else { ("ok ({0}): BA mask=0x{1:x}, CreateService cleared" -f $status, $finalMask) }
  register: scm_harden
  changed_when: "'ok (applied)' in scm_harden.stdout"
  failed_when: scm_harden.stdout is not search('^ok ')
