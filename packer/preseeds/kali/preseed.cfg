# Kali (Debian-installer) preseed for non-interactive base build.
# Produces a minimal Kali install; the Packer provisioner step adds the
# pentest toolkit subset we actually need.

# Locale / Keyboard
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us

# Network: DHCP (Packer's internal HTTP-only network gives a lease)
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string kali-base
d-i netcfg/get_domain string lab.local

# Mirror -- Kali rolling
d-i mirror/country string manual
d-i mirror/http/hostname string http.kali.org
d-i mirror/http/directory string /kali
d-i mirror/http/proxy string

# Accounts
d-i passwd/root-password password Nilgiri-Kali!
d-i passwd/root-password-again password Nilgiri-Kali!
d-i passwd/make-user boolean false

# Time
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i clock-setup/ntp boolean true

# Disk: single primary, no LVM (simpler for Packer snapshot/qcow2)
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select atomic
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true

# Base + minimal package set; rest provisioned by Packer shell step.
tasksel tasksel/first multiselect standard
d-i pkgsel/include string openssh-server sudo curl ca-certificates python3 python3-pip
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false

# Bootloader
d-i grub-installer/only_debian boolean true
d-i grub-installer/bootdev string /dev/vda

# Allow root SSH login (lab only)
d-i preseed/late_command string \
    in-target sh -c 'echo "PermitRootLogin yes" >> /etc/ssh/sshd_config' ; \
    in-target sh -c 'echo "PasswordAuthentication yes" >> /etc/ssh/sshd_config'

d-i finish-install/reboot_in_progress note
